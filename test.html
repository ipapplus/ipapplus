<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع Ahmed</title>
    <!-- ربط مكتبة Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #121212; /* خلفية سوداء داكنة */
            color: #fff; /* لون النص أبيض */
            margin: 0;
            height: 100vh;
            justify-content: center;
        }
        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-top: 20px;
        }
        h1 {
            color: #fff;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
            width: 150px;
        }
        .buttons a {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            color: white;
            border-radius: 5px;
        }
        .twitter { background-color: #1DA1F2; }
        .rootless { background-color: #333; }
        .roothide { background-color: #0073E6; }
    </style>
</head>
<body>

    <img src="https://i.imgur.com/Ao9WX2Z.jpeg" alt="Ahmed's Image">
    <h1>Ahmed</h1>

    <div class="buttons">
        <a href="https://x.com/ipapplus" target="_blank" class="twitter">
            <i class="fab fa-twitter"></i> Twitter
        </a>
        <a href="https://qhtx.github.io/" target="_blank" class="rootless">
            <i class="fas fa-cogs"></i> Rootless
        </a>
        <a href="https://re4yo.github.io/" target="_blank" class="roothide">
            <i class="fas fa-shield-alt"></i> Roothide
        </a>
    </div>

</body>
</html>
